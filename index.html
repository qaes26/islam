            { id: 69, cat: "طبية", q: "موقف الإسلام من (عدم التداوي) والاكتفاء بالدعاء لمرض عضال:", correct: "التداوي مستحب، وتركه لا يُعد جريمة انتحار أو قتل (خلافاً للقتل الرحيم).", wrong: ["تركه يُعد انتحاراً محَرَماً.", "التداوي محرم لأن فيه اعتراض على قدر الله.", "الدعاء لا ينفع في الأمراض العضوية."] },
            { id: 70, cat: "طبية", q: "المالك الحقيقي لحياة الإنسان وصحته وفق المنظور الإسلامي هو:", correct: "الله سبحانه وتعالى، والإنسان مجرد مستأمن عليها.", wrong: ["الإنسان نفسه، يفعل بجسده ما يشاء.", "الدولة أو المجتمع الذي يعيش فيه.", "الأسرة والوالدان."] }
        ];

        let displayQuestions = [];
        const container = document.getElementById('questionsContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreDisplayMobile = document.getElementById('scoreDisplayMobile');

        // خلط المصفوفة (Fisher-Yates)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // تهيئة وبناء الأسئلة
        function renderQuestions(filter = 'all') {
            container.innerHTML = '';
            
            const filteredData = filter === 'all' ? rawQuestionsData : rawQuestionsData.filter(q => q.cat === filter);
            
            filteredData.forEach((item, index) => {
                const qCard = document.createElement('div');
                qCard.className = "bg-white rounded-xl shadow-lg p-6 border border-gray-100 hover:shadow-xl transition-shadow duration-300 relative";
                qCard.id = `qCard-${item.id}`;
                
                // شريط الفئة
                const decoration = document.createElement('div');
                decoration.className = "absolute top-0 right-0 w-2 h-full bg-secondary rounded-r-xl";
                qCard.appendChild(decoration);

                // اسم الفئة
                const catLabel = document.createElement('span');
                catLabel.className = "inline-block bg-green-100 text-primary text-xs font-bold px-3 py-1 rounded-full mb-4 ml-4 border border-green-200";
                catLabel.innerText = getCategoryName(item.cat);
                qCard.appendChild(catLabel);

                // نص السؤال
                const questionTitle = document.createElement('h3');
                questionTitle.className = "text-xl font-bold text-gray-800 mb-5 leading-relaxed";
                questionTitle.innerHTML = `<span class="text-secondary select-none">س${item.id}:</span> ${item.q}`;
                qCard.appendChild(questionTitle);

                // تجميع الخيارات وخلطها
                let optionsList = [item.correct, ...item.wrong];
                optionsList = shuffleArray(optionsList);

                // حاوية الخيارات
                const optionsContainer = document.createElement('div');
                optionsContainer.className = "flex flex-col gap-3";
                
                optionsList.forEach((optText, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn text-right w-full bg-gray-50 hover:bg-gray-100 border-2 border-gray-200 text-gray-700 font-medium py-3 px-4 rounded-lg focus:outline-none";
                    btn.innerText = optText;
                    
                    // منطق الإجابة
                    btn.onclick = () => checkAnswer(item.id, optText, item.correct, optionsContainer, qCard);
                    
                    optionsContainer.appendChild(btn);
                });

                qCard.appendChild(optionsContainer);
                container.appendChild(qCard);
            });

            // حالة لا توجد نتائج
            if(filteredData.length === 0) {
                container.innerHTML = '<p class="col-span-1 lg:col-span-2 text-center text-gray-500 font-bold text-xl py-8">لا توجد أسئلة في هذا التصنيف.</p>';
            }
        }

        // دالة التحقق من الإجابة
        function checkAnswer(qId, selectedText, correctText, optionsContainer, cardElement) {
            if (answeredQuestions.has(qId)) return; // تم الإجابة مسبقاً
            
            answeredQuestions.add(qId);
            const buttons = optionsContainer.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.disabled = true; // تعطيل كل الأزرار
                if (btn.innerText === correctText) {
                    btn.classList.add('correct-ans'); // تظليل الإجابة الصحيحة دائماً
                }
                
                if (btn.innerText === selectedText && selectedText !== correctText) {
                    btn.classList.add('wrong-ans'); // تظليل الإجابة الخاطئة إذا اختارها
                }
            });

            // تحديث النتيجة
            if (selectedText === correctText) {
                currentScore++;
                updateScore();
                // تأثير خفيف عند الإجابة الصحيحة
                cardElement.classList.add('ring-4', 'ring-green-400', 'ring-opacity-50');
            } else {
                cardElement.classList.add('ring-4', 'ring-red-400', 'ring-opacity-50');
            }
        }

        // تحديث العدادات
        function updateScore() {
            scoreDisplay.innerText = currentScore;
            scoreDisplayMobile.innerText = currentScore;
        }

        // دالة تحويل رمز التصنيف لاسم
        function getCategoryName(cat) {
            const names = {
                'فكرية': 'قضايا فكرية',
                'محتوى': 'صناعة المحتوى',
                'بيئة': 'البيئة',
                'تنمر': 'التنمر والتحرش',
                'رقمية': 'تكنولوجيا ورقميات',
                'طبية': 'قضايا طبية'
            };
            return names[cat] || cat;
        }

        // فلترة الأسئلة
        function filterQuestions() {
            const val = document.getElementById('categoryFilter').value;
            renderQuestions(val);
        }

        // إعادة ضبط الاختبار
        function resetQuiz() {
            if(confirm("هل أنت متأكد من رغبتك في إعادة الاختبار وتصفير النتيجة؟")) {
                currentScore = 0;
                answeredQuestions.clear();
                updateScore();
                filterQuestions();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // تشغيل أولي
        window.onload = () => {
            renderQuestions('all');
        };
    </script>
